apiVersion: v1
kind: ServiceAccount
metadata:
  name: interview-api-sa
  namespace: default
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: interview-api-cluster-admin-binding
subjects:
  - kind: ServiceAccount
    name: interview-api-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
