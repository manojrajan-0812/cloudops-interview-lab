apiVersion: v1
kind: ServiceAccount
metadata:
  name: interview-api-sa
  namespace: default
automountServiceAccountToken: false
---
# BUG: cluster-admin gives this SA god-mode over the entire cluster.
# The app only needs read access to ConfigMaps in the default namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: interview-api-cluster-admin-binding
subjects:
  - kind: ServiceAccount
    name: interview-api-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
